<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker</title>
    <!-- Tailwind & daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Style -->
     <link rel="stylesheet" href="./style.css">
</head>
<body class="text-base-content antialiased">
    <header class="navbar flex-col sm:flex-row gap-6 justify-between bg-white border-b border-gray-300 shadow-sm sticky top-0 z-50 py-4 px-5 xl:px-20">
        <div class="flex gap-1 items-center">
            <img class="w-9 h-auto" src="./assets/github-logo.png" alt="logo">
            <span class="text-xl font-semibold text-gray-800">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-4">
            <div class="form-control relative">
                <label class="input">
                <svg class="h-[1.2em] opacity-70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                        >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
            </g>
            </svg>
            <input id="searchInput" type="text" class="grow border-[#E4E4E7]" placeholder="Search issues..." />
            </label>
            </div>
            <button class="btn btn-primary btn-md">
                <i class="fa-solid fa-plus mr-1"></i> New Issue
            </button>
        </div>
    </header>

    <main class="container mx-auto py-8 md:py-16 px-5">
        <section class="flex flex-col justify-between gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="join flex gap-2 rounded-sm overflow-hidden">
                <button onclick="filterIssues('all')" class="join-item btn btn-primary py-3 px-9 filter-btn rounded-sm border border-[#E4E4E7]">All</button>
                <button onclick="filterIssues('open')" class="join-item btn btn-ghost py-3 px-9 filter-btn rounded-sm border-[#E4E4E7]">Open</button>
                <button onclick="filterIssues('closed')" class="join-item btn btn-ghost py-3 px-9 filter-btn rounded-sm border-[#E4E4E7]">Closed</button>
            </div>   
            </div>

            <div class="rounded-lg shadow-lg">
                <div class="flex-row sm:flex items-center gap-8 bg-white border-b border-[#E4E4E7] p-6 rounded-t-lg">
                <div class="flex items-center gap-3 mb-7 sm:mb-0">
                    <div class="aperture">
                        <img src="./assets/Aperture.png" alt="Aperture">
                    </div>
                    <div>
                        <h2 id="issueCount" class="text-xl font-semibold mb-1">0 Issues</h2>
                        <p class="text-[#64748B] text-base">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm ml-auto">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-lg"></span>
                        <span class="font-medium">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-600 rounded-lg"></span>
                        <span class="font-medium">Closed</span>
                    </div>
                </div>
            </div>

                <div id="loading" class="text-center py-20 hidden">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3.5 bg-[#FBFBFB] p-6 rounded-lg">
            </div>
            </div>
        </section>
            <!-- modal -->
             <!-- Open the modal using ID.showModal() method -->
    <dialog id="issueDetails" class="modal p-5">
    <div class="modal-box w-full max-w-[43.75rem] p-8">
        <div id="issueDetailsContainer" class="flex items-center justify-center">  
        </div>

    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
         <div class="flex justify-end">
            <button class="btn btn btn-primary">Close</button>
        </div>
      </form>
    </div>
  </div>
    </dialog>
    </main>

    <script src="./index.js"></script>
</body>
</html>
